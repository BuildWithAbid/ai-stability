name: Feature request
description: Suggest an improvement to ai-stability
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Keep requests aligned with the project scope: CLI-first, local-first, and focused on LLM stability analysis.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What developer problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior or CLI workflow you want
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you evaluated

  - type: textarea
    id: scope
    attributes:
      label: Scope check
      description: Explain how this request fits the local-first CLI scope and avoids turning the project into a hosted platform
    validations:
      required: true
